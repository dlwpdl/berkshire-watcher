name: Berkshire Watcher

on:
  schedule:
    # KST 08:00 = UTC 23:00 (전날)
    - cron: "0 23 * * *"
    # KST 20:00 = UTC 11:00
    - cron: "0 11 * * *"
  workflow_dispatch:
    inputs:
      events_file:
        description: "Optional events JSON file for one-off manual sends"
        required: false
        default: ""

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/cache@v4
        with:
          path: state/seen.json
          key: berkshire-watcher-seen-${{ github.run_id }}
          restore-keys: |
            berkshire-watcher-seen-
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - run: |
          if [ -n "$EVENTS_FILE" ]; then
            npm run send -- --events "$EVENTS_FILE"
          else
            npm run send
          fi
        env:
          EVENTS_FILE: ${{ github.event.inputs.events_file }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_API_URL: https://integrate.api.nvidia.com/v1/chat/completions
          MINIMAX_MODEL: minimaxai/minimax-m3
          MIN_T_SCORE: "6"
